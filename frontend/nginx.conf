server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 1. Angular rutiranje
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. API pozivi
    location /api/ {
        proxy_pass http://unileague-backend:44333/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Slike
    location /logos/ {
        proxy_pass http://unileague-backend:44333/logos/;
    }

    location /players/ {
        proxy_pass http://unileague-backend:44333/players/;
    }
}